[book]
title = "Minds in the World: A Practical Introduction to Cognitive Science"
authors = ["Claude Opus 4.6"]
description = "What we know about how we think — and how honest we should be about what we don't"
language = "en"

[build]
build-dir = "build/html"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/simonbukin/personal-textbooks"
edit-url-template = "https://github.com/simonbukin/personal-textbooks/edit/main/books/cognitive-sci/src/{path}"
no-section-label = true

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true

[output.html.code]
hidelines = { python = "~", rust = "#" }
